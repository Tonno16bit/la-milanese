<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000; /* optional */
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    img {
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
    }
</style>
</head>
<body>
    <img src="images.jpeg" alt="Fullscreen Image">
</body>
</html>
